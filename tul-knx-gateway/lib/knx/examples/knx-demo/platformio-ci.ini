;PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html




;--- ESP32 -----------------------------------------------
[env:esp32dev_ip]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.20/platform-espressif32.zip
board = esp32dev
framework = arduino
lib_deps =
  https://github.com/tzapu/WiFiManager.git
  knx
  https://github.com/OpenKNX/tpuart.git

build_flags =
  -DMASK_VERSION=0x57B0
  -Wno-unknown-pragmas

[env:esp32dev_tp]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.20/platform-espressif32.zip
board = esp32dev
framework = arduino
lib_deps =
  knx
  https://github.com/OpenKNX/tpuart.git

build_flags =
  -DMASK_VERSION=0x07B0
  -Wno-unknown-pragmas

;--- RP2040 -----------------------------------------------
[env:rp2040]
framework = arduino
platform = https://github.com/maxgerhardt/platform-raspberrypi.git#e89b79e
platform_packages = framework-arduinopico @ https://github.com/earlephilhower/arduino-pico/releases/download/4.5.4/rp2040-4.5.4.zip
board = rpipico
board_build.core = earlephilhower

lib_deps =
  knx
  https://github.com/OpenKNX/tpuart.git

build_flags =
  -DMASK_VERSION=0x07B0
  -DKNX_FLASH_SIZE=4096
  -D PIO_FRAMEWORK_ARDUINO_ENABLE_RTTI
  -Wno-unknown-pragmas
